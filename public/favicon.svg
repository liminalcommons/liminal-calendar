<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Vesica Piscis — Liminal Commons symbol -->
  <!-- Two overlapping circles creating the almond-shaped intersection -->
  <circle cx="12" cy="16" r="10" fill="none" stroke="#c4935a" stroke-width="1.8" opacity="0.9"/>
  <circle cx="20" cy="16" r="10" fill="none" stroke="#c4935a" stroke-width="1.8" opacity="0.9"/>
  <!-- Vesica fill — the liminal space between -->
  <clipPath id="left-clip">
    <circle cx="12" cy="16" r="10"/>
  </clipPath>
  <circle cx="20" cy="16" r="10" fill="#c4935a" opacity="0.25" clip-path="url(#left-clip)"/>
</svg>
