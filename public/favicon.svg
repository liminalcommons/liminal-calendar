<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="border-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#78350f"/>
    </linearGradient>
  </defs>
  <!-- Background circle with gold gradient -->
  <circle cx="16" cy="16" r="15" fill="url(#gold-gradient)" stroke="url(#border-gradient)" stroke-width="1.5"/>
  <!-- Sowilo rune (ᛊ) - Sun/Light - representing Golden Hours -->
  <text x="16" y="22" font-family="serif" font-size="18" font-weight="bold" fill="#78350f" text-anchor="middle">ᛊ</text>
</svg>
